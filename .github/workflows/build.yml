name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 and build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-4-dev \
            libglib2.0-dev \
            libglib2.0-bin \
            libgraphene-1.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf-2.0-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: make build

      - name: Run tests
        run: make test

name: Fedora

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fedora:
    name: Fedora latest — build & test
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            qt6-qtbase-devel \
            cmake \
            ninja-build \
            gcc-c++ \
            git

      - name: Make mock scripts executable
        run: chmod +x tests/mocks/*

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure --timeout 30

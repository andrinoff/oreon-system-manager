name: Fedora

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fedora:
    name: Fedora latest — build & test
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            gtk4-devel \
            glib2-devel \
            graphene-devel \
            pango-devel \
            cairo-devel \
            gdk-pixbuf2-devel \
            glib2-devel \
            pkg-config \
            gcc \
            rust \
            cargo \
            git

      - name: Build
        run: make build

      - name: Run tests
        run: make test

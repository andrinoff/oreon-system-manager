name: Require Team Approval

on:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  check-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Verify and Auto-Approve
        env:
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        run: |
          ORG="${{ github.repository_owner }}"
          TEAM="${{ github.event.repository.name }}"
          PR="${{ github.event.pull_request.number }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"

          echo "=== Diagnostic Info ==="
          echo "Organization: $ORG"
          echo "Team Slug: $TEAM"
          echo "PR Number: $PR"
          echo "PR Author: $AUTHOR"
          echo "======================="

          echo "Testing API access to the team..."
          if ! gh api orgs/$ORG/teams/$TEAM > /dev/null 2>&1; then
            echo "❌ CRITICAL ERROR: The bot cannot find the team '$TEAM'."
            echo "Either the team slug is different, or the App lacks 'Members: Read-only' permission at the Org level."
            exit 1
          fi

          echo "Checking if @$AUTHOR is a member of the '$TEAM' team..."
          if gh api orgs/$ORG/teams/$TEAM/memberships/$AUTHOR > /dev/null 2>&1; then
            echo "✅ Author is a maintainer. Having the bot submit an official approval..."

            if ! gh pr review $PR --repo ${{ github.repository }} --approve --body "🤖 **Auto-Approved:** PR authored by an authorized maintainer (@$AUTHOR)."; then
              echo "❌ CRITICAL ERROR: Bot failed to submit the review. Ensure it has 'Pull requests: Read and write' permission."
              exit 1
            fi

            echo "✅ Auto-approval successful."
            exit 0
          fi

          echo "⚠️ @$AUTHOR is not a member of the '$TEAM' team. Checking for manual approvals..."

          APPROVERS=$(gh api repos/$ORG/$TEAM/pulls/$PR/reviews --jq '.[] | select(.state == "APPROVED") | .user.login' | sort -u)

          if [ -z "$APPROVERS" ]; then
            echo "❌ No approvals found. Blocking merge."
            exit 1
          fi

          APPROVED=false
          for USER in $APPROVERS; do
            if gh api orgs/$ORG/teams/$TEAM/memberships/$USER > /dev/null 2>&1; then
              echo "✅ Approved by authorized maintainer: @$USER"
              APPROVED=true
              break
            fi
          done

          if [ "$APPROVED" = false ]; then
            echo "❌ Approvals found, but none are from the authorized maintainer team."
            exit 1
          fi

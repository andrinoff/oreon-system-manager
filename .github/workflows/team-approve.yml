name: Require Team Approval

on:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  check-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Verify and Auto-Approve
        env:
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        run: |
          ORG="${{ github.repository_owner }}"
          TEAM="${{ github.event.repository.name }}"
          PR="${{ github.event.pull_request.number }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"

          echo "=== Diagnostic Info ==="
          echo "Organization: $ORG"
          echo "Team Slug: $TEAM"
          echo "PR Number: $PR"
          echo "PR Author: $AUTHOR"
          echo "======================="

          echo "Fetching team members..."
          # We grab the raw JSON array of all members in the team
          MEMBERS_JSON=$(gh api orgs/$ORG/teams/$TEAM/members) || {
            echo "❌ CRITICAL ERROR: The bot cannot find the team '$TEAM'."
            echo "Either the team slug is different, or the App lacks 'Members: Read-only' permission at the Org level."
            exit 1
          }

          # Count how many members are in the array
          MEMBER_COUNT=$(echo "$MEMBERS_JSON" | jq 'length')
          echo "Team size: $MEMBER_COUNT member(s)"

          # 1. Auto-Approve ONLY if the team has exactly 1 member AND that member is the author
          if [ "$MEMBER_COUNT" -eq 1 ]; then
            SOLE_MEMBER=$(echo "$MEMBERS_JSON" | jq -r '.[0].login')

            if [ "$SOLE_MEMBER" == "$AUTHOR" ]; then
              echo "✅ @$AUTHOR is the sole maintainer of this repository. Auto-approving..."

              if ! gh pr review $PR --repo ${{ github.repository }} --approve --body "🤖 **Auto-Approved:** PR authored by the sole repository maintainer (@$AUTHOR)."; then
                echo "❌ CRITICAL ERROR: Bot failed to submit the review. Ensure it has 'Pull requests: Read and write' permission."
                exit 1
              fi

              echo "✅ Auto-approval successful."
              exit 0
            fi
          fi

          echo "⚠️ @$AUTHOR is not a solo maintainer. Checking for manual approvals..."

          # 2. If not a solo maintainer, check for manual approvals from any team member
          APPROVERS=$(gh api repos/$ORG/$TEAM/pulls/$PR/reviews --jq '.[] | select(.state == "APPROVED") | .user.login' | sort -u)

          if [ -z "$APPROVERS" ]; then
            echo "❌ No approvals found. Blocking merge."
            exit 1
          fi

          APPROVED=false
          for USER in $APPROVERS; do
            # Check if the person who approved is actually in the team
            if gh api orgs/$ORG/teams/$TEAM/memberships/$USER > /dev/null 2>&1; then
              echo "✅ Approved by authorized maintainer: @$USER"
              APPROVED=true
              break
            fi
          done

          if [ "$APPROVED" = false ]; then
            echo "❌ Approvals found, but none are from the authorized maintainer team."
            exit 1
          fi
